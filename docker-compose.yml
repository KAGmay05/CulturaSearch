services:
  app:
    build: .
    image: culturasearch:local
    command: python main.py rag
    environment:
      OLLAMA_ENDPOINT: http://ollama:11434
      OLLAMA_MODEL: neural-chat
    volumes:
      - ./data:/app/data
      - ./bd:/app/bd
    depends_on:
      - ollama
    stdin_open: true
    tty: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  ollama: