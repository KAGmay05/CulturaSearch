services:
  app:
    build: .
    image: culturasearch:local
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      OLLAMA_ENDPOINT: http://ollama:11434
      OLLAMA_MODEL: neural-chat
    volumes:
      - ./:/app
    depends_on:
      - ollama
    stdin_open: true
    tty: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  ollama: